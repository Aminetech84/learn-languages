<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreLang</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #F5F2ED;
  --ink: #1C1917;
  --ink2: #78716C;
  --ink3: #C5C0BB;
  --surface: #FFFFFF;
  --border: rgba(28,25,23,0.08);
  --accent: #2D5A3D;
  --accent-bg: #EAF2EC;
  --serif: 'Lora', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}

/* ── Picker screen ── */
#pickerScreen {
  width: 100%;
  max-width: 540px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.picker-logo {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 2.5rem;
}

.picker-tagline {
  font-family: var(--serif);
  font-size: 18px;
  font-style: italic;
  color: var(--ink2);
  margin-bottom: 2.5rem;
  text-align: center;
  line-height: 1.6;
}

.picker-list {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 2rem;
}

.picker-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}

.picker-item:hover { border-color: rgba(28,25,23,0.2); background: #FDFCFA; }

.picker-item-left { display: flex; align-items: center; gap: 12px; }

.picker-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  width: 18px;
}

.picker-title {
  font-family: var(--serif);
  font-size: 17px;
  color: var(--ink);
}

.picker-steps {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
}

.picker-done {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-bg);
  padding: 2px 8px;
  border-radius: 99px;
}

/* ── Player screen ── */
#playerScreen {
  display: none;
  width: 100%;
  max-width: 580px;
  flex-direction: column;
  align-items: flex-start;
}

.player-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  margin-bottom: 3rem;
}

.back-btn {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink3);
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: 0.05em;
  padding: 0;
  transition: color 0.15s;
}

.back-btn:hover { color: var(--ink2); }

.player-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.player-prog {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
}

/* Progress bar */
.prog-bar {
  width: 100%;
  height: 2px;
  background: var(--border);
  border-radius: 99px;
  margin-bottom: 3rem;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}

/* Sentence stage */
.sentence {
  font-family: var(--serif);
  font-size: clamp(20px, 3.5vw, 30px);
  line-height: 1.8;
  color: var(--ink);
  min-height: 110px;
  width: 100%;
  margin-bottom: 3rem;
}

.token {
  display: inline;
  opacity: 0;
  transition: opacity 0.45s ease;
  white-space: pre;
}

.token.in { opacity: 1; }
.token.new { color: var(--accent); }
.token.settle { color: var(--ink); transition: color 1.4s ease, opacity 0.45s ease; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor {
  display: inline-block;
  width: 2px;
  height: 0.9em;
  background: var(--accent);
  vertical-align: text-bottom;
  margin-left: 1px;
  animation: blink 1.1s infinite;
}

/* Bottom row */
.player-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.hint {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink3);
  letter-spacing: 0.05em;
  transition: opacity 0.35s;
  min-width: 180px;
}

.hint.off { opacity: 0; }

.nav-btns { display: flex; gap: 8px; }

.btn {
  background: none;
  border: 0.5px solid var(--ink3);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink2);
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}

.btn:hover { border-color: var(--ink2); color: var(--ink); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--ink); color: var(--surface); border-color: var(--ink); }
.btn.primary:hover { opacity: 0.85; }
.btn.done-btn { background: var(--accent); color: white; border-color: var(--accent); }

/* Complete banner */
.complete {
  display: none;
  width: 100%;
  background: var(--accent-bg);
  border: 0.5px solid rgba(45,90,61,0.15);
  border-radius: 12px;
  padding: 14px 18px;
  font-family: var(--serif);
  font-size: 14px;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

/* Tagline overlay */
.tagline {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: var(--ink3);
  white-space: nowrap;
  pointer-events: none;
  transition: opacity 0.5s;
}

.tagline.hidden { opacity: 0; }
</style>
</head>
<body>

<!-- Picker -->
<div id="pickerScreen">
  <p class="picker-logo">CoreLang</p>
  <p class="picker-tagline">we start with a word,<br>we reach a story</p>
  <div class="picker-list" id="pickerList"></div>
</div>

<!-- Player -->
<div id="playerScreen">
  <div class="player-top">
    <button class="back-btn" onclick="showPicker()">← all sentences</button>
    <span class="player-title" id="playerTitle"></span>
    <span class="player-prog" id="playerProg"></span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="complete" id="completeBanner"></div>
  <div class="sentence" id="sentence"></div>
  <div class="player-bottom">
    <span class="hint off" id="hint"></span>
    <div class="nav-btns">
      <button class="btn" id="prevBtn" onclick="prevStep()">←</button>
      <button class="btn primary" id="nextBtn" onclick="nextStep()">→</button>
    </div>
  </div>
</div>

<div class="tagline" id="tagline">we start with a word, we reach a story</div>

<script>
const SENTENCES = [
  {
    id: 1, title: "The young woman",
    steps: [
      { tokens: ["woman"], hint: "noun — anchor" },
      { tokens: ["The ", "woman"], hint: "the — determiner" },
      { tokens: ["The ", "young ", "woman"], hint: "young — adjective" },
      { tokens: ["The ", "young ", "woman ", "gets up"], hint: "gets up — phrasal verb" },
      { tokens: ["The ", "young ", "woman ", "gets up ", "early"], hint: "early — adverb" },
      { tokens: ["The ", "young ", "woman ", "gets up ", "early ", "because"], hint: "because — conjunction" },
      { tokens: ["The ", "young ", "woman ", "gets up ", "early ", "because ", "she ", "loves"], hint: "she loves — pronoun + verb" },
      { tokens: ["The ", "young ", "woman ", "gets up ", "early ", "because ", "she ", "loves ", "her ", "job,"], hint: "her job — possessive + noun" },
      { tokens: ["The ", "young ", "woman ", "gets up ", "early ", "because ", "she ", "loves ", "her ", "job, ", "and"], hint: "and — coordinator" },
      { tokens: ["The ", "young ", "woman ", "gets up ", "early ", "because ", "she ", "loves ", "her ", "job, ", "and ", "she ", "carries on ", "working"], hint: "carries on — phrasal verb" },
      { tokens: ["The ", "young ", "woman ", "gets up ", "early ", "because ", "she ", "loves ", "her ", "job, ", "and ", "she ", "carries on ", "working ", "happily ", "all ", "day."], hint: "happily — happy + -ly" }
    ]
  },
  {
    id: 2, title: "The old man",
    steps: [
      { tokens: ["man"], hint: "noun — anchor" },
      { tokens: ["The ", "old ", "man"], hint: "old — adjective" },
      { tokens: ["The ", "old ", "man ", "sits back"], hint: "sits back — phrasal verb" },
      { tokens: ["The ", "old ", "man ", "sits back ", "alone"], hint: "alone — adverb" },
      { tokens: ["The ", "old ", "man ", "sits back ", "alone ", "by ", "the ", "door"], hint: "by the door — prepositional phrase" },
      { tokens: ["The ", "old ", "man ", "sits back ", "alone ", "by ", "the ", "door ", "and ", "goes over"], hint: "goes over — phrasal verb" },
      { tokens: ["The ", "old ", "man ", "sits back ", "alone ", "by ", "the ", "door ", "and ", "goes over ", "his ", "life"], hint: "his life — possessive + noun" },
      { tokens: ["The ", "old ", "man ", "sits back ", "alone ", "by ", "the ", "door ", "and ", "goes over ", "his ", "life ", "with ", "remarkable ", "calmness,"], hint: "calmness — calm + -ness" },
      { tokens: ["The ", "old ", "man ", "sits back ", "alone ", "by ", "the ", "door ", "and ", "goes over ", "his ", "life ", "with ", "remarkable ", "calmness, ", "no ", "longer ", "sad."], hint: "no longer — negation phrase" }
    ]
  },
  {
    id: 3, title: "The child",
    steps: [
      { tokens: ["child"], hint: "noun — anchor" },
      { tokens: ["The ", "child"], hint: "the — determiner" },
      { tokens: ["The ", "child ", "was ", "afraid"], hint: "afraid — adjective" },
      { tokens: ["The ", "child ", "was ", "afraid ", "of ", "the ", "dark,"], hint: "of the dark — prepositional phrase" },
      { tokens: ["The ", "child ", "was ", "afraid ", "of ", "the ", "dark, ", "so"], hint: "so — result conjunction" },
      { tokens: ["The ", "child ", "was ", "afraid ", "of ", "the ", "dark, ", "so ", "she ", "turned on"], hint: "turned on — phrasal verb" },
      { tokens: ["The ", "child ", "was ", "afraid ", "of ", "the ", "dark, ", "so ", "she ", "turned on ", "the ", "light"], hint: "the light — noun phrase" },
      { tokens: ["The ", "child ", "was ", "afraid ", "of ", "the ", "dark, ", "so ", "she ", "turned on ", "the ", "light ", "because ", "she ", "could not ", "settle down."], hint: "settle down — phrasal verb" }
    ]
  },
  {
    id: 4, title: "She keeps on",
    steps: [
      { tokens: ["She"], hint: "pronoun — anchor" },
      { tokens: ["She ", "works"], hint: "works — verb root" },
      { tokens: ["She ", "keeps on ", "working"], hint: "keeps on — phrasal verb" },
      { tokens: ["She ", "keeps on ", "working ", "tirelessly"], hint: "tirelessly — tire + -less + -ly" },
      { tokens: ["She ", "keeps on ", "working ", "tirelessly ", "because"], hint: "because — conjunction" },
      { tokens: ["She ", "keeps on ", "working ", "tirelessly ", "because ", "she ", "wants"], hint: "wants — verb" },
      { tokens: ["She ", "keeps on ", "working ", "tirelessly ", "because ", "she ", "wants ", "a ", "meaningful ", "life"], hint: "meaningful — mean + -ful" },
      { tokens: ["She ", "keeps on ", "working ", "tirelessly ", "because ", "she ", "wants ", "a ", "meaningful ", "life ", "for ", "her ", "child,"], hint: "for her child — purpose phrase" },
      { tokens: ["She ", "keeps on ", "working ", "tirelessly ", "because ", "she ", "wants ", "a ", "meaningful ", "life ", "for ", "her ", "child, ", "and ", "she ", "never ", "gives up."], hint: "gives up — phrasal verb" }
    ]
  },
  {
    id: 5, title: "The young man",
    steps: [
      { tokens: ["man"], hint: "noun — anchor" },
      { tokens: ["The ", "young ", "man"], hint: "young — adjective" },
      { tokens: ["The ", "young ", "man ", "tried"], hint: "tried — verb root" },
      { tokens: ["The ", "young ", "man ", "tried ", "persistently"], hint: "persistently — persist + -ent + -ly" },
      { tokens: ["The ", "young ", "man ", "tried ", "persistently ", "to ", "find out"], hint: "find out — phrasal verb" },
      { tokens: ["The ", "young ", "man ", "tried ", "persistently ", "to ", "find out ", "about ", "work,"], hint: "about work — prepositional phrase" },
      { tokens: ["The ", "young ", "man ", "tried ", "persistently ", "to ", "find out ", "about ", "work, ", "but"], hint: "but — contrast conjunction" },
      { tokens: ["The ", "young ", "man ", "tried ", "persistently ", "to ", "find out ", "about ", "work, ", "but ", "the ", "world ", "was ", "hard,"], hint: "hard — adjective" },
      { tokens: ["The ", "young ", "man ", "tried ", "persistently ", "to ", "find out ", "about ", "work, ", "but ", "the ", "world ", "was ", "hard, ", "and ", "he ", "almost ", "gave up ", "hope."], hint: "gave up — phrasal verb" }
    ]
  }
];

const done = new Set(JSON.parse(localStorage.getItem('cl_done') || '[]'));

let activeSentence = null;
let activeStep = -1;

function saveDone() {
  localStorage.setItem('cl_done', JSON.stringify([...done]));
}

function buildPicker() {
  document.getElementById('pickerList').innerHTML = SENTENCES.map((s, i) => {
    const isDone = done.has(s.id);
    return `
      <div class="picker-item" onclick="loadSentence(${i})">
        <div class="picker-item-left">
          <span class="picker-num">${i + 1}</span>
          <span class="picker-title">${s.title}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="picker-steps">${s.steps.length} steps</span>
          ${isDone ? '<span class="picker-done">done</span>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

function showPicker() {
  activeSentence = null;
  activeStep = -1;
  document.getElementById('pickerScreen').style.display = 'flex';
  document.getElementById('playerScreen').style.display = 'none';
  document.getElementById('tagline').classList.remove('hidden');
  buildPicker();
}

function loadSentence(idx) {
  activeSentence = SENTENCES[idx];
  activeStep = -1;
  document.getElementById('pickerScreen').style.display = 'none';
  document.getElementById('playerScreen').style.display = 'flex';
  document.getElementById('tagline').classList.add('hidden');
  document.getElementById('playerTitle').textContent = activeSentence.title.toLowerCase();
  document.getElementById('completeBanner').style.display = 'none';
  renderStep(false);
}

function renderStep(highlight) {
  const s = activeSentence;
  const stepData = activeStep >= 0 ? s.steps[activeStep] : null;
  const total = s.steps.length;
  const pct = activeStep < 0 ? 0 : Math.round(((activeStep + 1) / total) * 100);

  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('playerProg').textContent = activeStep < 0 ? `0 / ${total}` : `${activeStep + 1} / ${total}`;

  const hint = document.getElementById('hint');
  if (stepData) {
    hint.textContent = stepData.hint;
    hint.classList.remove('off');
  } else {
    hint.classList.add('off');
  }

  const sentEl = document.getElementById('sentence');
  if (!stepData) {
    sentEl.innerHTML = '<span class="cursor"></span>';
  } else {
    const prev = activeStep > 0 ? s.steps[activeStep - 1].tokens.length : 0;
    let html = '';
    stepData.tokens.forEach((t, i) => {
      const isNew = highlight && i >= prev;
      html += `<span class="token in ${isNew ? 'new' : ''}" id="tok${i}">${t}</span>`;
    });
    if (activeStep < total - 1) html += '<span class="cursor"></span>';
    sentEl.innerHTML = html;

    if (highlight) {
      setTimeout(() => {
        stepData.tokens.forEach((t, i) => {
          const el = document.getElementById('tok' + i);
          if (el) { el.classList.remove('new'); el.classList.add('settle'); }
        });
      }, 1000);
    }
  }

  const isLast = activeStep === total - 1;
  const nextBtn = document.getElementById('nextBtn');
  const completeBanner = document.getElementById('completeBanner');

  if (isLast) {
    nextBtn.textContent = '↺ restart';
    nextBtn.className = 'btn done-btn';
    completeBanner.style.display = 'block';
    completeBanner.textContent = 'Sentence complete — you built this from one word.';
    done.add(s.id);
    saveDone();
  } else {
    nextBtn.textContent = '→';
    nextBtn.className = 'btn primary';
    completeBanner.style.display = 'none';
  }

  document.getElementById('prevBtn').style.opacity = activeStep <= 0 ? '0.3' : '1';
}

function nextStep() {
  if (!activeSentence) return;
  if (activeStep === activeSentence.steps.length - 1) {
    activeStep = -1;
    renderStep(false);
    return;
  }
  activeStep++;
  renderStep(true);
}

function prevStep() {
  if (activeStep <= 0) return;
  activeStep--;
  renderStep(false);
}

document.addEventListener('keydown', e => {
  if (!activeSentence) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'Escape') showPicker();
});

buildPicker();
</script>
</body>
</html>
