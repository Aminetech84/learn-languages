<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreLang — Sentence Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #F5F2ED;
  --ink: #1C1917;
  --ink2: #78716C;
  --ink3: #A8A29E;
  --surface: #FFFFFF;
  --border: rgba(28,25,23,0.1);
  --accent: #2D5A3D;
  --accent2: #185FA5;
  --amber: #854F0B;
  --serif: 'Lora', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--ink);
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
}

.wrap {
  max-width: 680px;
  margin: 0 auto;
}

/* Header */
.hdr {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 3rem;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border);
}

.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink2);
  letter-spacing: 0.05em;
}

.progress-text {
  font-size: 12px;
  color: var(--ink3);
  font-family: var(--mono);
}

/* Sentence selector */
.selector {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 2.5rem;
}

.s-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 0.5px solid var(--border);
  background: var(--surface);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.s-btn:hover { border-color: var(--ink2); color: var(--ink2); }
.s-btn.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }
.s-btn.unlocked { border-color: var(--accent); color: var(--accent); }
.s-btn.done { background: var(--accent); color: var(--surface); border-color: var(--accent); }

/* Draft tabs */
.draft-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 0;
  border-bottom: 0.5px solid var(--border);
}

.d-tab {
  padding: 8px 18px;
  font-size: 12px;
  font-family: var(--mono);
  color: var(--ink3);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -0.5px;
  transition: all 0.15s;
  position: relative;
}

.d-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
.d-tab.locked { opacity: 0.35; cursor: not-allowed; }
.d-tab .lock { font-size: 9px; margin-left: 4px; }

/* Main card */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-top: none;
  border-radius: 0 0 16px 16px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  min-height: 260px;
  display: flex;
  flex-direction: column;
}

.draft-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 1.5rem;
}

.sentence {
  font-family: var(--serif);
  font-size: 22px;
  line-height: 1.7;
  color: var(--ink);
  flex: 1;
  margin-bottom: 1.5rem;
}

.sentence .pv {
  color: var(--accent);
  font-style: italic;
}

.sentence .af {
  color: var(--accent2);
  font-style: italic;
}

/* Word breakdown */
.breakdown {
  border-top: 0.5px solid var(--border);
  padding-top: 1.25rem;
  display: none;
}

.breakdown.visible { display: block; }

.bd-label {
  font-size: 10px;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink3);
  margin-bottom: 10px;
}

.bd-rules {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.rule-chip {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--bg);
  color: var(--ink2);
  border: 0.5px solid var(--border);
}

.rule-chip .arrow { color: var(--ink3); margin: 0 3px; }
.rule-chip .affix { color: var(--accent2); font-weight: 500; }

/* Bottom bar */
.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.btn {
  padding: 10px 20px;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 0.5px solid var(--border);
  background: transparent;
  color: var(--ink2);
  transition: all 0.15s;
}

.btn:hover { background: var(--bg); }

.btn-primary {
  background: var(--ink);
  color: var(--surface);
  border-color: transparent;
}

.btn-primary:hover { opacity: 0.85; }
.btn-primary:active { transform: scale(0.98); }

.btn-accent {
  background: var(--accent);
  color: var(--surface);
  border-color: transparent;
}

.btn-accent:hover { opacity: 0.85; }

/* Status line */
.status {
  font-size: 12px;
  color: var(--ink3);
  font-family: var(--mono);
}

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.leg {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--ink3);
  font-family: var(--mono);
}

.leg-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* Unlock animation */
@keyframes unlock {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

.unlocking { animation: unlock 0.35s ease; }

/* Done state */
.done-banner {
  display: none;
  background: #EAF2EC;
  border: 0.5px solid rgba(45,90,61,0.2);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--accent);
  font-family: var(--mono);
  margin-bottom: 1.5rem;
  align-items: center;
  gap: 8px;
}

.done-banner.visible { display: flex; }
</style>
</head>
<body>

<div class="wrap">
  <div class="hdr">
    <span class="logo">CoreLang / sentence builder</span>
    <span class="progress-text" id="progressText">0 / 20 complete</span>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--ink)"></div> root verb</div>
    <div class="leg"><div class="leg-dot" style="background:var(--accent)"></div> phrasal verb</div>
    <div class="leg"><div class="leg-dot" style="background:var(--accent2)"></div> affix / derivative</div>
  </div>

  <div class="selector" id="selector"></div>

  <div class="done-banner" id="doneBanner">✓ All three drafts unlocked — sentence mastered.</div>

  <div class="draft-tabs" id="draftTabs"></div>

  <div class="card" id="card">
    <p class="draft-label" id="draftLabel"></p>
    <p class="sentence" id="sentenceText"></p>
    <div class="breakdown" id="breakdown">
      <p class="bd-label">morphology</p>
      <div class="bd-rules" id="bdRules"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="status" id="statusText"></span>
    <div style="display:flex;gap:8px">
      <button class="btn" id="prevBtn" onclick="prevSentence()">← prev</button>
      <button class="btn btn-primary" id="actionBtn" onclick="handleAction()">unlock draft 2 →</button>
      <button class="btn" id="nextBtn" onclick="nextSentence()">next →</button>
    </div>
  </div>
</div>

<script>
const sentences = [
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `The old man <b>sits</b> alone by the door and <b>thinks about</b> his life, but he does not feel sad anymore.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `The old man <b class="pv">sits back</b> alone by the door and <b class="pv">goes over</b> his life, but he does not feel sad anymore.`, rules: [] },
      { label: "draft 3 — affixes", text: `The old man sits back alone by the door and goes over his life with <b class="af">remarkable</b> <b class="af">calmness</b>, no longer sad.`, rules: ["remark → remarkable (-able)","calm → calmness (-ness)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `She <b>works</b> hard every day because she wants a good life for her child, and she never <b>stops</b> hoping.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `She <b class="pv">keeps on</b> working hard every day because she wants a good life for her child, and she never <b class="pv">gives up</b>.`, rules: [] },
      { label: "draft 3 — affixes", text: `She keeps on working <b class="af">tirelessly</b> because she wants a <b class="af">meaningful</b> life for her child, and she never gives up.`, rules: ["tire → tireless → tirelessly (-less + -ly)","mean → meaningful (-ful)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `When the young woman <b>reads</b> a book, she feels strong, and she believes that the world can <b>change</b>.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `When the young woman <b class="pv">picks up</b> a book, she feels strong, and she believes the world can <b class="pv">turn around</b>.`, rules: [] },
      { label: "draft 3 — affixes", text: `When the young woman picks up a book, she feels <b class="af">empowered</b>, and she believes the world can <b class="af">transform</b>.`, rules: ["power → empower → empowered (em- + -ed)","trans- prefix: across, through, beyond"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `The child <b>ran</b> out of the dark room and <b>held</b> his mother's hand because he was very afraid.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `The child <b class="pv">ran out of</b> the dark room and <b class="pv">held on to</b> his mother's hand because he was very afraid.`, rules: [] },
      { label: "draft 3 — affixes", text: `The child ran out of the dark room and held on to his mother's hand, <b class="af">visibly</b> <b class="af">terrified</b>.`, rules: ["visible → visibly (-ly)","terror → terrify → terrified (-ify + -ed)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `He <b>lost</b> his work and his money in one day, but he still <b>believed</b> in himself and <b>started</b> again.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `He <b class="pv">lost out on</b> his work and money in one day, but he still believed in himself and <b class="pv">started over</b>.`, rules: [] },
      { label: "draft 3 — affixes", text: `He lost out on his work and money in one day, but his <b class="af">unshakeable</b> belief in himself helped him start over.`, rules: ["shake → unshakeable (un- + -able)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `Although the road was long and hard, she <b>moved</b> forward slowly because she knew the way.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `Although the road was long and hard, she <b class="pv">pressed on</b> slowly because she knew the way.`, rules: [] },
      { label: "draft 3 — affixes", text: `Although the road was long and hard, she pressed on with <b class="af">determination</b> because she knew the way.`, rules: ["determine → determination (-ation)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `The father <b>told</b> his child a story every night so that the child would not be afraid of the dark.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `The father <b class="pv">made up</b> a story for his child every night so that the child would not be afraid of the dark.`, rules: [] },
      { label: "draft 3 — affixes", text: `The father made up <b class="af">imaginative</b> stories for his child every night so the child would not be afraid of the dark.`, rules: ["imagine → imaginative (-ative)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `She wanted to <b>start</b> a new life in a big city, but she did not have enough money, so she <b>waited</b>.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `She wanted to <b class="pv">set up</b> a new life in a big city, but she did not have enough money, so she <b class="pv">held off</b>.`, rules: [] },
      { label: "draft 3 — affixes", text: `She wanted to set up a new life in a big city, but <b class="af">financial</b> <b class="af">insecurity</b> forced her to hold off.`, rules: ["finance → financial (-ial)","secure → insecurity (in- + -ity)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `When two old friends <b>meet</b> after a long time, they <b>sit</b> together and speak softly about the years gone by.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `When two old friends <b class="pv">catch up</b> after a long time, they <b class="pv">sit down</b> together and speak softly about the years gone by.`, rules: [] },
      { label: "draft 3 — affixes", text: `When two old friends catch up after a long time, they sit down and speak <b class="af">nostalgically</b> about the years gone by.`, rules: ["nostalgia → nostalgic → nostalgically (-ic + -ally)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `The young man <b>tried</b> to find work, but the world was hard, and he almost <b>gave up</b> hope.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `The young man tried to <b class="pv">find out</b> about work, but the world was hard, and he almost <b class="pv">gave up</b> hope.`, rules: [] },
      { label: "draft 3 — affixes", text: `The young man tried <b class="af">persistently</b> to find out about work, but the world was hard, and he almost gave up hope.`, rules: ["persist → persistent → persistently (-ent + -ly)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `Because she <b>cared for</b> her old mother, she never went far from home, and she <b>learned</b> to love the small life she had.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `Because she <b class="pv">looked after</b> her old mother, she never went far from home, and she <b class="pv">came to</b> love the small life she had.`, rules: [] },
      { label: "draft 3 — affixes", text: `Because she looked after her <b class="af">ageing</b> mother with <b class="af">devotion</b>, she never went far from home.`, rules: ["age → ageing (-ing as adjective)","devote → devotion (-ion)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `He <b>stood</b> at the door of the old house and <b>looked in</b>, but he did not go back inside.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `He <b class="pv">showed up</b> at the door of the old house and <b class="pv">looked in</b>, but he did not go back inside.`, rules: [] },
      { label: "draft 3 — affixes", text: `He showed up at the door of the <b class="af">abandoned</b> house and looked in, but something <b class="af">unexplainable</b> stopped him.`, rules: ["abandon → abandoned (-ed as adjective)","explain → unexplainable (un- + -able)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `If you <b>believe</b> in your work and <b>do</b> it well, people will see your name and remember it.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `If you <b class="pv">believe in</b> your work and <b class="pv">carry it out</b> well, people will <b class="pv">look up</b> your name and remember it.`, rules: [] },
      { label: "draft 3 — affixes", text: `If you believe in your work and carry it out with <b class="af">consistency</b>, people will look up your name and remember it.`, rules: ["consist → consistent → consistency (-ent + -cy)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `The woman <b>sat</b> quietly in the cold room and <b>wrote</b> a long story about a man she used to know.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `The woman <b class="pv">settled down</b> quietly and <b class="pv">put down</b> a long story about a man she used to know.`, rules: [] },
      { label: "draft 3 — affixes", text: `The woman settled down quietly and put down a <b class="af">deeply personal</b> story about a man she used to know.`, rules: ["deep → deeply (-ly as intensifier)","personal: person → personal (-al)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `Though he was poor and weak, he <b>helped</b> people without asking for money, and they loved him for it.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `Though he was poor and weak, he <b class="pv">reached out to</b> people without asking for money, and they loved him for it.`, rules: [] },
      { label: "draft 3 — affixes", text: `Though he was poor and weak, his <b class="af">selfless</b> <b class="af">generosity</b> touched people, and they loved him for it.`, rules: ["self → selfless (-less)","generous → generosity (-ity)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `She <b>made</b> hot food for her friend every day, and they <b>ate</b> together slowly, without speaking a word.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `She <b class="pv">whipped up</b> hot food for her friend every day, and they <b class="pv">sat down</b> together slowly, without speaking a word.`, rules: [] },
      { label: "draft 3 — affixes", text: `She whipped up hot food for her friend every day, and they sat down in <b class="af">comfortable</b> silence, without speaking a word.`, rules: ["comfort → comfortable (-able)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `The child <b>grew up</b> fast, and one day he looked at his father and saw an old and tired man.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `The child <b class="pv">grew up</b> fast, and one day he looked at his father and <b class="pv">made out</b> an old and tired man.`, rules: [] },
      { label: "draft 3 — affixes", text: `The child grew up fast, and one day he looked at his father and saw a man <b class="af">worn</b> by time and <b class="af">hardship</b>.`, rules: ["wear → worn (irregular past participle as adjective)","hard → hardship (-ship)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `When she felt afraid and alone, she <b>called</b> her friend, and they spoke softly until the light came back.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `When she felt afraid and alone, she <b class="pv">reached out to</b> her friend, and they spoke softly until the light <b class="pv">came back</b>.`, rules: [] },
      { label: "draft 3 — affixes", text: `When she felt afraid and alone, she reached out to her friend, and they spoke until the <b class="af">darkness</b> gave way to light.`, rules: ["dark → darkness (-ness)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `He tried to <b>learn</b> a new way of working, but old ways are hard to <b>change</b>, and he moved slowly.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `He tried to <b class="pv">pick up</b> a new way of working, but old ways are hard to <b class="pv">let go of</b>, and he moved slowly.`, rules: [] },
      { label: "draft 3 — affixes", text: `He tried to pick up a new way of working, but <b class="af">deeply rooted</b> habits are hard to let go of.`, rules: ["deep → deeply (-ly)","root → rooted (-ed as adjective)"] }
    ]
  },
  {
    drafts: [
      { label: "draft 1 — root verbs", text: `Because the world is big and time is short, she chose to live well, love deeply, and give what she could.`, rules: [] },
      { label: "draft 2 — phrasal verbs", text: `Because the world is big and time is short, she chose to live well, <b class="pv">hold on to</b> love, and <b class="pv">give back</b> what she could.`, rules: [] },
      { label: "draft 3 — affixes", text: `Because the world is big and time is <b class="af">precious</b>, she chose to live with <b class="af">intention</b>, hold on to love, and give back <b class="af">generously</b>.`, rules: ["price → precious (-ious)","intend → intention (-ion)","generous → generously (-ly)"] }
    ]
  }
];

const state = {
  current: 0,
  activeDraft: 0,
  unlocked: sentences.map(() => 1)
};

function countDone() {
  return state.unlocked.filter(u => u >= 3).length;
}

function renderSelector() {
  const sel = document.getElementById('selector');
  sel.innerHTML = sentences.map((s, i) => {
    const u = state.unlocked[i];
    let cls = '';
    if (i === state.current) cls = 'active';
    else if (u >= 3) cls = 'done';
    else if (u > 1) cls = 'unlocked';
    return `<button class="s-btn ${cls}" onclick="goTo(${i})">${i+1}</button>`;
  }).join('');
}

function renderTabs() {
  const u = state.unlocked[state.current];
  const labels = ['draft 1', 'draft 2', 'draft 3'];
  document.getElementById('draftTabs').innerHTML = labels.map((l, i) => {
    const locked = i >= u;
    const active = i === state.activeDraft;
    return `<button class="d-tab ${active ? 'active' : ''} ${locked ? 'locked' : ''}" onclick="${locked ? '' : `setDraft(${i})`}">${l}${locked ? '<span class="lock">⊗</span>' : ''}</button>`;
  }).join('');
}

function renderCard() {
  const s = sentences[state.current];
  const d = s.drafts[state.activeDraft];
  const u = state.unlocked[state.current];

  document.getElementById('draftLabel').textContent = d.label;
  const st = document.getElementById('sentenceText');
  st.innerHTML = d.text;
  st.classList.add('unlocking');
  setTimeout(() => st.classList.remove('unlocking'), 400);

  const bd = document.getElementById('breakdown');
  const rules = document.getElementById('bdRules');
  if (state.activeDraft === 2 && d.rules.length) {
    rules.innerHTML = d.rules.map(r => {
      const parts = r.split('(');
      return `<div class="rule-chip">${parts[0].trim()} ${parts[1] ? '<span class="affix">('+parts[1]+'</span>' : ''}</div>`;
    }).join('');
    bd.classList.add('visible');
  } else {
    bd.classList.remove('visible');
  }

  const done = u >= 3;
  document.getElementById('doneBanner').classList.toggle('visible', done);

  const btn = document.getElementById('actionBtn');
  if (done) {
    btn.textContent = 'next sentence →';
    btn.className = 'btn btn-accent';
    btn.onclick = nextSentence;
  } else if (u === 1) {
    btn.textContent = 'unlock draft 2 →';
    btn.className = 'btn btn-primary';
    btn.onclick = handleAction;
  } else if (u === 2) {
    btn.textContent = 'unlock draft 3 →';
    btn.className = 'btn btn-primary';
    btn.onclick = handleAction;
  }

  document.getElementById('statusText').textContent = `sentence ${state.current + 1} / 20 · draft ${state.activeDraft + 1} / 3`;
  document.getElementById('progressText').textContent = `${countDone()} / 20 complete`;
}

function setDraft(i) {
  state.activeDraft = i;
  renderTabs();
  renderCard();
}

function handleAction() {
  const u = state.unlocked[state.current];
  if (u < 3) {
    state.unlocked[state.current] = u + 1;
    state.activeDraft = u;
  }
  renderSelector();
  renderTabs();
  renderCard();
}

function goTo(i) {
  state.current = i;
  state.activeDraft = 0;
  renderSelector();
  renderTabs();
  renderCard();
}

function prevSentence() {
  if (state.current > 0) goTo(state.current - 1);
}

function nextSentence() {
  if (state.current < sentences.length - 1) goTo(state.current + 1);
}

goTo(0);
</script>
</body>
</html>
